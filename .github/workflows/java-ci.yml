name: Java CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile all Java files
        run: |
          echo "Finding and compiling all .java files..."
          files=$(find . -name "*.java" -not -path "./.git/*")
          echo "Files found: $(echo "$files" | wc -l)"
          failed=0
          while IFS= read -r f; do
            mkdir -p out
            if ! javac -encoding UTF-8 -d out "$f" 2>err.txt; then
              echo "FAILED: $f"
              cat err.txt
              failed=$((failed + 1))
            fi
          done <<< "$files"
          if [ $failed -gt 0 ]; then
            echo "$failed file(s) failed to compile."
            exit 1
          fi
          echo "All files compiled successfully!"
