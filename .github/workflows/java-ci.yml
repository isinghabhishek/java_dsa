name: Java CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile all Java files
        run: |
          echo "Finding and compiling all .java files..."
          mkdir -p out
          # Build quoted args file for javac (handles spaces in folder names)
          find . -name "*.java" -not -path "./.git/*" | while IFS= read -r f; do
            printf '"%s"\n' "$f"
          done > sources.txt
          echo "Files found: $(wc -l < sources.txt)"
          javac -encoding UTF-8 -d out @sources.txt
          echo "Compilation successful!"
